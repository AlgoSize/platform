name: e2e

on:
  push:
    paths:
      - "site/**"
      - "worker/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "site/**"
      - "worker/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"

jobs:
  playwright:
    name: Playwright happy-path
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Toolchains. The site is Jekyll (Ruby 3.2 + bundler) and the
      # Worker + Playwright suite are Node 20.
      # ---------------------------------------------------------------
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: site

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------------
      # Dependencies. Each side has its own lockless install (no
      # package-lock.json committed) so we use plain `npm install`.
      # ---------------------------------------------------------------
      - name: Install Worker deps
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: npm install --no-audit --no-fund

      - name: Install Chromium for Playwright
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      # ---------------------------------------------------------------
      # Worker secrets needed by the suite. JWT_SECRET must match what
      # tests/e2e/global-setup.mjs uses to mint the synthetic JWT, and
      # E2E_TEST_SECRET unlocks POST /api/_test/seed for the dashboard
      # spec. Both are local-only placeholders — never used in prod.
      # ---------------------------------------------------------------
      - name: Write Worker .dev.vars
        run: |
          cat > worker/.dev.vars <<'EOF'
          JWT_SECRET=local-dev-only-jwt-secret-32-chars-min-not-for-prod-xxxxx
          SITE_ORIGIN=http://localhost:5001
          STRIPE_SECRET_KEY=sk_test_placeholder_set_real_key_in_local_only
          STRIPE_WEBHOOK_SECRET=whsec_placeholder
          STRIPE_PRICE_ID=price_placeholder
          E2E_TEST_SECRET=local-e2e-seed-secret-do-not-use-in-prod
          EOF

      # ---------------------------------------------------------------
      # Playwright spawns Jekyll (port 5001) and wrangler (port 8787)
      # itself via webServer config; we just kick the suite off.
      # ---------------------------------------------------------------
      - name: Run Playwright
        working-directory: tests/e2e
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7
