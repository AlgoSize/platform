name: Build and deploy Jekyll site

# Builds the marketing site (lives in /site) on every push to main and deploys
# it to GitHub Pages. This replaces the old setup where Pages was wired to a
# side branch (cloudflare/workers-autoconfig) with the Jekyll files restructured
# at the repo root — that was needed only because Pages' "Deploy from a branch"
# mode can't build a Jekyll project that lives in a subdirectory.
#
# Source switch needed in the GitHub UI (one-time, by a repo admin):
#   Settings → Pages → Build and deployment → Source → "GitHub Actions".
#
# After that, every push to main rebuilds and redeploys the site.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/jekyll.yml"
  workflow_dispatch:

# Only one deploy at a time; cancel in-progress runs queued behind a newer one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: site

      - uses: actions/configure-pages@v5

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --config _config.yml,_config.production.yml \
            --destination _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
