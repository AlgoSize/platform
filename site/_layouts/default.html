<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0d14'/%3E%3Cpath d='M14 46 L26 18 L38 46 M18 38 L34 38' stroke='%235eead4' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  </head>
  <body>
    {{ content }}
    <script>
      // API base for the Worker. Empty in production (same origin via
      // Cloudflare route algosize.com/api/*); set to the wrangler dev URL
      // in local development. See site/_config.yml.
      window.ALGOSIZE_API_BASE = {{ site.api_base | default: "" | jsonify }};
    </script>
    <script src="{{ '/assets/js/checkout.js' | relative_url }}" defer></script>
  </body>
</html>
