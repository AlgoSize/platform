<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AWS savings plan gaps — Algosize blog hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#11151e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2532" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Decorative chart bars: under-utilised commitment vs actual usage -->
  <g transform="translate(700,140)" opacity="0.95">
    <rect x="0"   y="180" width="36" height="180" fill="#1e2532"/>
    <rect x="56"  y="120" width="36" height="240" fill="#1e2532"/>
    <rect x="112" y="80"  width="36" height="280" fill="#1e2532"/>
    <rect x="168" y="60"  width="36" height="300" fill="#1e2532"/>
    <rect x="224" y="100" width="36" height="260" fill="#1e2532"/>
    <rect x="280" y="40"  width="36" height="320" fill="#1e2532"/>
    <rect x="336" y="20"  width="36" height="340" fill="#1e2532"/>

    <!-- actual usage line under the commitment ceiling -->
    <path d="M 18 240 L 74 220 L 130 200 L 186 180 L 242 220 L 298 160 L 354 140"
          stroke="url(#accent)" stroke-width="3" fill="none"/>
    <!-- commitment line -->
    <line x1="0" y1="60" x2="372" y2="60" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="380" y="64" fill="#f59e0b" font-family="ui-monospace, monospace" font-size="14">commitment</text>
    <text x="380" y="148" fill="#5eead4" font-family="ui-monospace, monospace" font-size="14">actual</text>
  </g>

  <!-- Title + brand mark -->
  <g transform="translate(72,140)">
    <text fill="#5eead4" font-family="ui-monospace, monospace" font-size="22" letter-spacing="3">ALGOSIZE · CLOUD COST</text>
    <text y="80"  fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">How to spot AWS</text>
    <text y="148" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">Savings Plan gaps</text>
    <text y="216" fill="#8a93a3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">The under-commitment most teams miss.</text>
  </g>

  <g transform="translate(72,520)">
    <text fill="#f1f3f6" font-family="ui-monospace, monospace" font-size="20" font-weight="800" letter-spacing="-2">[as]</text>
    <text x="40" y="0" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">algosize.com/blog</text>
  </g>
</svg>
