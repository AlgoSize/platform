<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Lockfile vulnerabilities — Algosize blog hero">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#11151e"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2532" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#grid2)" opacity="0.6"/>

  <!-- Stylised lockfile snippet -->
  <g transform="translate(700,120)" font-family="ui-monospace, monospace" font-size="18">
    <rect x="0" y="0" width="420" height="380" rx="14" fill="#131825" stroke="#1e2532"/>
    <text x="20" y="40"  fill="#8a93a3">package-lock.json</text>
    <line x1="20" y1="56" x2="400" y2="56" stroke="#1e2532"/>
    <text x="20" y="92"  fill="#8a93a3">"lodash":</text>
    <text x="20" y="118" fill="#fda4af">  "version": "4.17.15",</text>
    <text x="20" y="144" fill="#fb7185">  CVE-2020-8203  ↑ 4.17.21</text>
    <text x="20" y="186" fill="#8a93a3">"axios":</text>
    <text x="20" y="212" fill="#fda4af">  "version": "0.21.0",</text>
    <text x="20" y="238" fill="#fb7185">  CVE-2021-3749  ↑ 0.21.4</text>
    <text x="20" y="280" fill="#8a93a3">"minimist":</text>
    <text x="20" y="306" fill="#fda4af">  "version": "1.2.5",</text>
    <text x="20" y="332" fill="#fb7185">  CVE-2021-44906 ↑ 1.2.6</text>
  </g>

  <g transform="translate(72,140)">
    <text fill="#fb7185" font-family="ui-monospace, monospace" font-size="22" letter-spacing="3">ALGOSIZE · VULN SCAN</text>
    <text y="80"  fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">Lockfile vulns:</text>
    <text y="148" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">the 95% you can</text>
    <text y="216" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">fix in one PR</text>
    <text y="282" fill="#8a93a3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">Triage less. Bump more.</text>
  </g>

  <g transform="translate(72,520)">
    <text fill="#f1f3f6" font-family="ui-monospace, monospace" font-size="20" font-weight="800" letter-spacing="-2">[as]</text>
    <text x="40" y="0" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">algosize.com/blog</text>
  </g>
</svg>
