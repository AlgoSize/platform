<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Big-O isn't the bottleneck — Algosize blog hero">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#11151e"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2532" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#grid3)" opacity="0.6"/>

  <!-- Two curves: O(n) red-herring and the real allocation cliff -->
  <g transform="translate(700,140)">
    <!-- axes -->
    <line x1="0" y1="320" x2="400" y2="320" stroke="#1e2532" stroke-width="2"/>
    <line x1="0" y1="320" x2="0"   y2="20"  stroke="#1e2532" stroke-width="2"/>
    <text x="380" y="350" fill="#5b6373" font-family="ui-monospace, monospace" font-size="14">n</text>
    <text x="-50" y="30"  fill="#5b6373" font-family="ui-monospace, monospace" font-size="14">ms</text>

    <!-- O(n) line — boring -->
    <path d="M 0 300 L 400 220" stroke="#5eead4" stroke-width="3" fill="none"/>
    <text x="320" y="200" fill="#5eead4" font-family="ui-monospace, monospace" font-size="14">O(n) — fine</text>

    <!-- allocation cliff -->
    <path d="M 0 300 Q 220 300 280 240 Q 320 200 360 80" stroke="url(#accent3)" stroke-width="4" fill="none"/>
    <text x="220" y="120" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="14">GC pause cliff</text>
    <circle cx="360" cy="80" r="6" fill="#fbbf24"/>
  </g>

  <g transform="translate(72,140)">
    <text fill="#fbbf24" font-family="ui-monospace, monospace" font-size="22" letter-spacing="3">ALGOSIZE · ALGO PERF</text>
    <text y="80"  fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">Big-O isn't the</text>
    <text y="148" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">bottleneck.</text>
    <text y="216" fill="#fbbf24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="600">It's allocation.</text>
    <text y="282" fill="#8a93a3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">Why your O(n) loop spikes p99.</text>
  </g>

  <g transform="translate(72,520)">
    <text fill="#f1f3f6" font-family="ui-monospace, monospace" font-size="20" font-weight="800" letter-spacing="-2">[as]</text>
    <text x="40" y="0" fill="#f1f3f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">algosize.com/blog</text>
  </g>
</svg>
