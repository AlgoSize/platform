title: Algosize
description: >-
  Algosize helps engineering teams cut cloud spend, find vulnerabilities,
  and optimize critical algorithms.
url: "https://algosize.com"
baseurl: ""

# Base URL of the Algosize Worker API.
# Empty string  → same origin (production: Worker is mapped to algosize.com/api/*).
# Local dev     → set to "http://127.0.0.1:8787" so the JS checkout interceptor
#                 can reach `wrangler dev`. Override per-environment via
#                 `JEKYLL_ENV=development bundle exec jekyll serve --config …`
#                 or just edit this value when developing locally.
api_base: "http://127.0.0.1:8787"

permalink: /:path/

plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
