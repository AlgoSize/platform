title: Algosize
description: >-
  Algosize helps engineering teams cut cloud spend, find vulnerabilities,
  and optimize critical algorithms.
url: "https://algosize.com"
baseurl: ""

# Base URL of the Algosize Worker API.
# This value is the LOCAL DEV default. The CI build for GitHub Pages overrides
# it via `_config.production.yml` (api_base: "") so production renders use
# same-origin URLs (the Worker is mapped to algosize.com/api/*).
api_base: "http://127.0.0.1:8787"

permalink: /:path/

plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - _config.production.yml
