# Production overrides for the Jekyll build.
#
# Used in CI by the GitHub Actions workflow:
#   bundle exec jekyll build --config _config.yml,_config.production.yml
#
# Local dev (`bundle exec jekyll serve`) ignores this file and keeps the
# defaults from _config.yml (api_base pointing at wrangler dev on 127.0.0.1).

# Empty string → relative URL → same-origin requests. In production the
# Cloudflare Worker is mapped to algosize.com/api/*, so the browser hits the
# same domain that served the page (no CORS preflight, no cross-origin cookie
# headache).
api_base: ""

# Privacy-respecting analytics (Task #26). Plausible is cookieless and GDPR-
# compliant, so no cookie banner is needed. The `domain` MUST match the value
# configured on the Plausible side (plausible.io/sites or self-hosted) — the
# script ignores events from any other domain. Local dev (`jekyll serve`)
# does NOT load this file, so analytics stays off in development.
#
# To switch off analytics (e.g. during an incident) without redeploying:
#   leave `enabled: false` here and re-merge.
analytics:
  enabled: true
  provider: plausible
  domain: algosize.com
  # Plausible's hosted endpoint. Override to a self-hosted host if needed.
  src: "https://plausible.io/js/script.tagged-events.js"
