name = "algosize"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ----------------------------------------------------------------------------
# KV namespace bindings
# ----------------------------------------------------------------------------
# IDs are real Cloudflare namespace IDs. Locally, Miniflare maps these to
# in-memory KV (no real Cloudflare reads/writes). In production they bind to
# the real namespaces created with `wrangler kv namespace create <NAME>`.
[[kv_namespaces]]
binding = "SESSIONS"
id      = "2a67b8b8fa4444f2b04b4ee7b98407dc"

[[kv_namespaces]]
binding = "USERS"
id      = "b321f8eeccf0422694b87f719fa0d70c"

# ----------------------------------------------------------------------------
# D1 database binding — user records + run history (Task #25).
# ----------------------------------------------------------------------------
# Holds the `users` table (replaces the user:/email:/cust: keys previously
# in USERS KV) and the `runs` table (replaces the run:/runs: keys previously
# in RUNS KV). SESSIONS KV stays for session JWTs + Stripe-event dedup, and
# USERS KV stays for monthly quota counters at quota:<userId>:<YYYY-MM>.
#
# The placeholder database_id below is for local dev (Miniflare maps it to
# an in-memory SQLite); production + staging override with the real UUIDs
# printed by `wrangler d1 create algosize`. See DEPLOY.md §2.5.
[[d1_databases]]
binding       = "DB"
database_name = "algosize"
database_id   = "00000000-0000-0000-0000-000000000000"

# ----------------------------------------------------------------------------
# Service binding — algorithm-optimizer sandbox (Task #16)
# ----------------------------------------------------------------------------
# The main Worker calls `env.SANDBOX.fetch(...)` to run user-supplied JS in a
# sibling Worker's isolate so a runaway loop can't take down the API. The
# sibling Worker lives in `/worker-sandbox` and must be deployed first:
#   cd worker-sandbox && wrangler deploy --env production
# In single-Worker dev mode (no service binding) the main Worker falls back
# to in-process execution — same code, same sandbox model, just no
# CPU-budget isolation between Workers.
[[services]]
binding = "SANDBOX"
service = "algosize-sandbox"

# ----------------------------------------------------------------------------
# Default (local-dev) public env vars. Override per-environment below.
# ----------------------------------------------------------------------------
[vars]
SITE_ORIGIN = "http://localhost:5000"
COOKIE_NAME = "algosize_session"
# Analytics noscript-pixel forwarder (Task #26). The Worker accepts a GET
# at /api/pageview from <noscript><img> and POSTs server-side to Plausible.
# Override PLAUSIBLE_ENDPOINT for self-hosted; ANALYTICS_DOMAIN must match
# the site's _config.production.yml `analytics.domain`.
ANALYTICS_DOMAIN  = "algosize.com"
PLAUSIBLE_ENDPOINT = "https://plausible.io"
# Transactional email (Task #56) — Google Workspace via Gmail API.
# EMAIL_FROM         displayed From: header (RFC 5322 with optional name).
# EMAIL_DELEGATED_USER  Workspace mailbox the service account impersonates
#                    via domain-wide delegation. Must match a real user
#                    inbox on the Workspace tenant. The Gmail API send
#                    URL embeds this as the {userId} path segment.
# EMAIL_REPLY_TO     optional override for the Reply-To: header. If unset,
#                    replies go back to EMAIL_FROM.
# Local dev: leave the placeholder values; sendTransactional treats
# missing GOOGLE_SERVICE_ACCOUNT_JSON as "not configured" and silently
# no-ops with a single warn-level log line. See DEPLOY.md §3.6.
EMAIL_FROM           = "Algosize <noreply@algosize.com>"
EMAIL_DELEGATED_USER = "noreply@algosize.com"

# ----------------------------------------------------------------------------
# Production overrides (used by `wrangler deploy --env production`).
# Cookie name stays the same; SITE_ORIGIN points to the deployed site/worker.
# Update SITE_ORIGIN once the marketing site has its own domain so CORS,
# cookie scope, and Stripe redirects line up with where the user actually
# loads the site from.
# ----------------------------------------------------------------------------
[env.production]
name   = "algosize"
# Same-origin API binding so the browser can POST to https://algosize.com/api/*
# without CORS preflights and so session cookies are first-party. The marketing
# site is served by GitHub Pages on the apex; this route hands /api/* to the
# Worker. Mirrors the staging block below. See DEPLOY.md §4.2.
routes = [
  { pattern = "algosize.com/api/*", zone_name = "algosize.com" },
]

[env.production.vars]
# Production site origin: must match the hostname users load the site from.
# Used for CORS allow-list, cookie scope, and Stripe redirect URLs.
# See DEPLOY.md §2.4. Override here if you ship under www. or a different host.
SITE_ORIGIN = "https://algosize.com"
COOKIE_NAME = "algosize_session"
ANALYTICS_DOMAIN  = "algosize.com"
PLAUSIBLE_ENDPOINT = "https://plausible.io"
EMAIL_FROM           = "Algosize <noreply@algosize.com>"
EMAIL_DELEGATED_USER = "noreply@algosize.com"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id      = "2a67b8b8fa4444f2b04b4ee7b98407dc"

[[env.production.kv_namespaces]]
binding = "USERS"
id      = "b321f8eeccf0422694b87f719fa0d70c"

# D1 database for user records + run history (Task #25). Created via
# the Cloudflare D1 API on 2026-05-03; schema applied from
# migrations/0001_init.sql against the same uuid. See DEPLOY.md §2.5.
[[env.production.d1_databases]]
binding       = "DB"
database_name = "algosize"
database_id   = "cfe388b1-8423-48ec-b1ec-358e3a8127d8"

[[env.production.services]]
binding = "SANDBOX"
service = "algosize-sandbox"

# ----------------------------------------------------------------------------
# Staging overrides (used by `wrangler deploy --env staging`). Task #23.
# Lives at https://staging.algosize.com so risky changes (real analyzer
# integrations, schema migrations, Stripe webhook event additions) can be
# exercised end-to-end against Stripe TEST mode before they hit prod.
# Bound to its own KV namespaces, its own sandbox sibling Worker, its own
# Stripe test-mode secrets, and its own Sentry project (operationally — the
# DSN is just a different secret value). See DEPLOY.md §7.
# ----------------------------------------------------------------------------
[env.staging]
name   = "algosize-staging"
routes = [
  { pattern = "staging.algosize.com/api/*", zone_name = "algosize.com" },
]

[env.staging.vars]
# Staging site origin: matches the hostname users load the staging site from.
# Drives CORS allow-list, cookie Domain attribute, and Stripe redirect URLs.
SITE_ORIGIN = "https://staging.algosize.com"
COOKIE_NAME = "algosize_session"
ANALYTICS_DOMAIN  = "staging.algosize.com"
PLAUSIBLE_ENDPOINT = "https://plausible.io"
# Staging uses the same Workspace tenant; use a separate mailbox so test
# sends don't touch the production noreply@ inbox.
EMAIL_FROM           = "Algosize Staging <noreply-staging@algosize.com>"
EMAIL_DELEGATED_USER = "noreply-staging@algosize.com"

# KV namespace IDs are placeholders. Create the real ones with:
#   wrangler kv namespace create SESSIONS --env staging
#   wrangler kv namespace create USERS    --env staging
# then paste each printed id below. See DEPLOY.md §7.1.
[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id      = "0000000000000000000000000000stg1"

[[env.staging.kv_namespaces]]
binding = "USERS"
id      = "0000000000000000000000000000stg2"

# Separate D1 database for staging (Task #25). Create with
#   wrangler d1 create algosize-staging
# and paste the printed UUID below. See DEPLOY.md §7.1.
[[env.staging.d1_databases]]
binding       = "DB"
database_name = "algosize-staging"
database_id   = "00000000-0000-0000-0000-00000000stg1"

# Separate sandbox sibling Worker so a bad sandbox deploy can be tested in
# staging without touching prod isolates. Defined in
# `worker-sandbox/wrangler.toml` under its own `[env.staging]` block.
[[env.staging.services]]
binding = "SANDBOX"
service = "algosize-sandbox-staging"

# ----------------------------------------------------------------------------
# Required SECRETS — never declared in this file.
# ----------------------------------------------------------------------------
#   JWT_SECRET             32+ random bytes; HMAC-SHA-256 key for sessions
#   STRIPE_SECRET_KEY      Stripe API key (sk_test_... / sk_live_...)
#   STRIPE_WEBHOOK_SECRET  Endpoint secret for /api/stripe/webhook
#   STRIPE_PRICE_ID        Price ID for the monthly subscription plan
#   OPENAI_API_KEY         OpenAI API key for the algorithm optimizer's LLM
#                          refactor suggestions (Task #16). When unset the
#                          analyzer still returns timing + Big-O — the
#                          suggestion section just shows a "set OPENAI_API_KEY
#                          to enable AI suggestions" notice.
#   GOOGLE_SERVICE_ACCOUNT_JSON
#                          Full JSON key file from Google Cloud Console for
#                          the service account that has domain-wide
#                          delegation on the Workspace tenant for the
#                          gmail.send scope (Task #56). When unset the
#                          worker still creates accounts — sendTransactional
#                          just no-ops with a single warn-level log line.
#                          Provisioning + rotation steps live in DEPLOY.md
#                          §3.6, DNS records (SPF/DKIM/DMARC) in §4.4.
#
# Local dev: put these in `worker/.dev.vars` (gitignored). See
# `worker/.dev.vars.example` for the template.
#
# Production: set them with:
#   cd worker && wrangler secret put JWT_SECRET             --env production
#   cd worker && wrangler secret put STRIPE_SECRET_KEY      --env production
#   cd worker && wrangler secret put STRIPE_WEBHOOK_SECRET  --env production
#   cd worker && wrangler secret put STRIPE_PRICE_ID        --env production
#   cd worker && wrangler secret put OPENAI_API_KEY         --env production
#   cd worker && wrangler secret put GOOGLE_SERVICE_ACCOUNT_JSON --env production
#
# Staging: same names, different values (Stripe TEST mode keys, separate
# Sentry project DSN, etc.). Set them with `--env staging`:
#   cd worker && wrangler secret put JWT_SECRET             --env staging
#   cd worker && wrangler secret put STRIPE_SECRET_KEY      --env staging   # sk_test_…
#   cd worker && wrangler secret put STRIPE_WEBHOOK_SECRET  --env staging   # whsec_… from staging endpoint
#   cd worker && wrangler secret put STRIPE_PRICE_ID        --env staging   # price_… from test mode
#   cd worker && wrangler secret put OPENAI_API_KEY         --env staging   # optional
#   cd worker && wrangler secret put SENTRY_DSN             --env staging   # optional, separate project
#   cd worker && wrangler secret put RELEASE_TAG            --env staging

[dev]
port = 8787
ip   = "127.0.0.1"
